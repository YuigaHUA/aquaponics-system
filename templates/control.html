{% extends "base.html" %}
{% block title %}设备控制 | {{ project_name }}{% endblock %}
{% block page_title %}设备控制{% endblock %}
{% block page_title_breadcrumb %}设备控制{% endblock %}
{% block content %}
<!-- 中文注释：控制页复用卡片、按钮组、告警条和表格，不新建自定义控件。 -->
<div class="row">
    <div class="col-12">
        <div id="controlAlert"></div>
    </div>
</div>

<div class="row" id="controlDeviceCards"></div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">最近控制记录</h3>
            </div>
            <div class="card-body table-responsive p-0">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>命令编号</th>
                            <th>设备</th>
                            <th>动作</th>
                            <th>状态</th>
                            <th>说明</th>
                            <th>发起时间</th>
                            <th>回执时间</th>
                        </tr>
                    </thead>
                    <tbody id="controlCommandTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    // 中文注释：控制页通过现成按钮发起命令，不做自定义组件封装。
    window.CONTROL_ENDPOINTS = {
        devicesUrl: "{{ url_for('api.devices') }}",
        commandsUrl: "{{ url_for('api.recent_commands') }}",
        controlUrlTemplate: "{{ url_for('api.control_device', device_code='__DEVICE__') }}"
    };
</script>
<script src="{{ url_for('static', filename='js/control.js') }}"></script>
{% endblock %}
