{% extends "base.html" %}
{% block title %}模拟器配置 | {{ project_name }}{% endblock %}
{% block page_title %}模拟器配置{% endblock %}
{% block page_title_breadcrumb %}模拟器配置{% endblock %}
{% block content %}
<!-- 中文注释：模拟器配置按设备列表生成，保存后重启内置模拟线程。 -->
<div class="row">
    <div class="col-12">
        <div id="simulatorAlert"></div>
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">设备数据模拟配置</h3>
            </div>
            <form id="simulatorForm">
                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>设备</th>
                                <th>类型</th>
                                <th>在线</th>
                                <th>最小值</th>
                                <th>最大值</th>
                                <th>波动大小</th>
                                <th>开关值</th>
                            </tr>
                        </thead>
                        <tbody id="simulatorConfigBody"></tbody>
                    </table>
                </div>
                <div class="card-footer text-end">
                    <button type="button" class="btn btn-outline-secondary" id="reloadSimulatorButton">重新加载</button>
                    <button type="submit" class="btn btn-primary">保存并重启模拟器</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    // 中文注释：模拟器配置保存后会触发后台模拟线程重启。
    window.SIMULATOR_ENDPOINTS = {
        configsUrl: "{{ url_for('api.simulator_configs') }}"
    };
</script>
<script src="{{ url_for('static', filename='js/simulator.js') }}"></script>
{% endblock %}
