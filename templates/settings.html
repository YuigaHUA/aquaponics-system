{% extends "base.html" %}
{% block title %}系统配置 | {{ project_name }}{% endblock %}
{% block page_title %}系统配置{% endblock %}
{% block page_title_breadcrumb %}系统配置{% endblock %}
{% block content %}
<!-- 中文注释：系统配置保存到数据库，部分运行参数需要重启后生效。 -->
<div class="row">
    <div class="col-12">
        <div id="settingsAlert"></div>
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">配置项</h3>
            </div>
            <form id="settingsForm">
                <div class="card-body">
                    <div class="alert alert-info mb-3">
                        保存后会持久化到数据库；MQTT 和模拟器相关配置需重启对应进程后生效。
                    </div>
                    <div class="row g-3" id="settingsFields"></div>
                </div>
                <div class="card-footer text-end">
                    <button type="submit" class="btn btn-primary">保存配置</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    // 中文注释：配置接口统一返回已掩码的密钥字段。
    window.SETTINGS_ENDPOINTS = {
        configsUrl: "{{ url_for('api.system_configs') }}"
    };
</script>
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
